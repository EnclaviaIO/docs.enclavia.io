name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: VitePress build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload built site
        uses: actions/upload-artifact@v4
        with:
          name: vitepress-dist
          path: .vitepress/dist
          retention-days: 1

  link-check:
    name: Link check (lychee)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built site
        uses: actions/download-artifact@v4
        with:
          name: vitepress-dist
          path: .vitepress/dist

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # Scan the built HTML so internal cleanUrls links (`/install`,
          # `/egress#json-schema`, etc.) resolve as real files. `root-dir`
          # treats absolute paths as relative to dist; `fallback-extensions`
          # lets `/install` resolve to `install.html`. Config accepts 401
          # (auth-walled api/mcp roots) and 403/429 (rate-limited hosts);
          # 404s (including any future dead `enclavia-samples` link)
          # still fail the job.
          args: >-
            --config ./lychee.toml
            --no-progress
            --root-dir ${{ github.workspace }}/.vitepress/dist
            --fallback-extensions html
            .vitepress/dist
          fail: true
